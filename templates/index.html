<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bank Loan Predictor</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
        }

        .card{
            width: 500px;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        h2{
            text-align: center;
            margin-bottom: 25px;
            color: #2a5298;
            font-weight: bold;
        }

        .btn-custom{
            width: 100%;
            background-color: #2a5298;
            color: white;
            font-weight: bold;
        }

        .btn-custom:hover{
            background-color: #1e3c72;
            color: white;
        }
    </style>
</head>

<body>

<div class="card">
    <h2>🏦 Bank Loan Predictor</h2>

    <form action="/" method="POST">

        <div class="mb-3">
            <label class="form-label">Employment Years</label>
            <input type="number" step="any" class="form-control" name="employ" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Income</label>
            <input type="number" step="any" class="form-control" name="income" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Debt Income Ratio</label>
            <input type="number" step="any" class="form-control" name="debtinc" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Credit Debt</label>
            <input type="number" step="any" class="form-control" name="creddebt" required>
        </div>

        <div class="mb-4">
            <label class="form-label">Other Debt</label>
            <input type="number" step="any" class="form-control" name="othdebt" required>
        </div>

        <button type="submit" class="btn btn-custom">
            Predict Loan Status
        </button>

        {% if prediction %}
        <div class="alert alert-info mt-4 text-center">
            <strong>{{ prediction }}</strong>
        </div>
        {% endif %}

    </form>
</div>

</body>
</html>
